flru:
  display_name: FL.ru
  login_url: https://www.fl.ru/account/login/
  feed_url: https://www.fl.ru/projects/
  session_file: flru.json
  selectors:
    card: "article, .b-post, .project-list-item"
    title: "h2 a, .b-post__title a, .project-list-item__title a"
    url: "h2 a, .b-post__title a, .project-list-item__title a"
    description: ".b-post__txt, .project-list-item__description"
    budget: ".b-post__price, .project-list-item__price"
    date: "time, .b-post__date"
  apply:
    apply_button: "a[href*='offer'], button[data-role='reply']"
    proposal_textarea: "textarea[name='message'], textarea"
    submit_button: "button[type='submit'], button[data-role='submit']"
    chat_link: "a[href*='messages'], a[href*='chat']"

freelance_ru:
